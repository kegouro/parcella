<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10131c" />
      <stop offset="50%" stop-color="#14172a" />
      <stop offset="100%" stop-color="#1a1d35" />
    </linearGradient>

    <!-- Text Gradient for Parcella -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#e8e5ff" />
      <stop offset="100%" stop-color="#c4b5fd" />
    </linearGradient>

    <!-- Volume faces gradient -->
    <linearGradient id="volGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#4a3499" stop-opacity="0.07" />
    </linearGradient>

    <linearGradient id="topGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.12" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Subtle grid pattern in the background (very faint) -->
  <g stroke="#7a759e" stroke-opacity="0.05" stroke-width="1" fill="none">
    <!-- Horizontal lines -->
    <line x1="0" y1="50" x2="1200" y2="50" />
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="250" x2="1200" y2="250" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="355" x2="1200" y2="355" />
    <!-- Vertical lines -->
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="400" y1="0" x2="400" y2="400" />
    <line x1="600" y1="0" x2="600" y2="400" />
    <line x1="800" y1="0" x2="800" y2="400" />
    <line x1="1000" y1="0" x2="1000" y2="400" />
  </g>

  <!-- Faint mathematical curves sweeping the canvas (Representing coords/integration) -->
  <g fill="none" stroke-width="1.5">
    <!-- Amber radial path -->
    <path d="M -50,200 Q 250,380 500,200 T 1050,200 T 1300,100" stroke="#f5a524" stroke-opacity="0.08" stroke-dasharray="6,6" />
    <!-- Cyan polar path -->
    <path d="M -50,120 Q 300,-50 650,250 T 1350,150" stroke="#38bdf8" stroke-opacity="0.07" />
    <!-- Green azimuthal path -->
    <path d="M -50,280 Q 200,180 550,320 T 1150,100" stroke="#34d399" stroke-opacity="0.08" stroke-dasharray="10,6" />
    <!-- Faint circular grids centered near logo -->
    <circle cx="210" cy="200" r="160" stroke="#7c5cff" stroke-opacity="0.05" stroke-dasharray="4,8" />
    <circle cx="210" cy="200" r="280" stroke="#7c5cff" stroke-opacity="0.04" stroke-dasharray="4,8" />
    <circle cx="210" cy="200" r="420" stroke="#7c5cff" stroke-opacity="0.03" stroke-dasharray="4,8" />
  </g>

  <!-- LOGO EMBEDDED (Left Side) -->
  <g transform="translate(60, 0)">
    <!-- Faint glowing backdrop behind the 3D element -->
    <circle cx="160" cy="200" r="110" fill="#7c5cff" opacity="0.08" filter="url(#glowFilter)" />
    
    <!-- 3D Volume Element (Parcella) -->
    <g transform="translate(10, 0)">
      <!-- Faces -->
      <!-- Left -->
      <path d="M 150,200 L 150,144 L 94,200 L 94,256 Z" fill="url(#volGrad)" />
      <!-- Bottom -->
      <path d="M 150,200 L 206,216 L 262,288 Q 178,272 94,256 Z" fill="url(#volGrad)" />
      <!-- Right -->
      <path d="M 206,216 L 206,160 L 262,232 L 262,288 Z" fill="url(#volGrad)" />
      <!-- Top -->
      <path d="M 150,144 Q 178,152 206,160 L 262,232 Q 178,216 94,200 Z" fill="url(#topGrad)" />
      <!-- Front -->
      <path d="M 94,256 Q 178,272 262,288 L 262,232 Q 178,216 94,200 Z" fill="url(#volGrad)" stroke="#7c5cff" stroke-width="1.2" stroke-opacity="0.2" />

      <!-- Back Edges (Dashed) -->
      <!-- Radial (Amber) -->
      <line x1="150" y1="200" x2="94" y2="256" stroke="#f5a524" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="3,3" />
      <!-- Polar (Cyan) -->
      <line x1="150" y1="200" x2="150" y2="144" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="3,3" />
      <!-- Azimuthal (Green) -->
      <path d="M 150,200 Q 178,208 206,216" fill="none" stroke="#34d399" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="3,3" />

      <!-- Front Edges (Solid with glow) -->
      <!-- Radial (Amber) -->
      <line x1="150" y1="144" x2="94" y2="200" stroke="#f5a524" stroke-width="3.5" stroke-linecap="round" filter="url(#glowFilter)" />
      <line x1="206" y1="216" x2="262" y2="288" stroke="#f5a524" stroke-width="3.5" stroke-linecap="round" filter="url(#glowFilter)" />
      <line x1="206" y1="160" x2="262" y2="232" stroke="#f5a524" stroke-width="3.5" stroke-linecap="round" filter="url(#glowFilter)" />
      
      <!-- Polar (Cyan) -->
      <line x1="94" y1="256" x2="94" y2="200" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round" filter="url(#glowFilter)" />
      <line x1="262" y1="288" x2="262" y2="232" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round" filter="url(#glowFilter)" />
      <line x1="206" y1="216" x2="206" y2="160" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round" filter="url(#glowFilter)" />
      
      <!-- Azimuthal (Green) -->
      <path d="M 94,256 Q 178,272 262,288" fill="none" stroke="#34d399" stroke-width="3.5" stroke-linecap="round" filter="url(#glowFilter)" />
      <path d="M 94,200 Q 178,216 262,232" fill="none" stroke="#34d399" stroke-width="3.5" stroke-linecap="round" filter="url(#glowFilter)" />
      <path d="M 150,144 Q 178,152 206,160" fill="none" stroke="#34d399" stroke-width="3.5" stroke-linecap="round" filter="url(#glowFilter)" />
    </g>

    <!-- White core nodes -->
    <g fill="#ffffff" filter="url(#glowFilter)">
      <circle cx="104" cy="256" r="2.5" />
      <circle cx="272" cy="288" r="2.5" />
      <circle cx="272" cy="232" r="2.5" />
      <circle cx="104" cy="200" r="2.5" />
    </g>
  </g>

  <!-- BRANDING TEXT (Right Side) -->
  <!-- App Title -->
  <text x="460" y="185" font-family="'Inter', -apple-system, system-ui, sans-serif" font-weight="900" font-size="86" fill="url(#textGrad)" letter-spacing="0.5">Parcella</text>
  
  <!-- Subtle line divider -->
  <line x1="460" y1="210" x2="1080" y2="210" stroke="#7c5cff" stroke-opacity="0.3" stroke-width="2" />
  
  <!-- Subtitle -->
  <text x="462" y="248" font-family="'Inter', -apple-system, system-ui, sans-serif" font-weight="600" font-size="22" fill="#dcd8f5" letter-spacing="0.2">Mira el diferencial. Integra lo que ves.</text>
  
  <!-- Description -->
  <text x="462" y="284" font-family="'Inter', -apple-system, system-ui, sans-serif" font-weight="400" font-size="16" fill="#7a759e">Visualizador interactivo del elemento diferencial y la integración por regiones</text>
  <text x="462" y="308" font-family="'Inter', -apple-system, system-ui, sans-serif" font-weight="400" font-size="14" fill="#7a759e" opacity="0.8">Cálculo Multivariable y Electromagnetismo · Cartesianas, Polares, Cilíndricas y Esféricas</text>

  <!-- Elegant accent badge in the top right -->
  <g transform="translate(1000, 45)">
    <rect width="115" height="26" rx="13" fill="#7c5cff" fill-opacity="0.15" stroke="#7c5cff" stroke-opacity="0.3" stroke-width="1" />
    <text x="57" y="17" font-family="'Inter', -apple-system, system-ui, sans-serif" font-weight="700" font-size="11" fill="#c4b5fd" text-anchor="middle">V1.0 RELEASE</text>
  </g>
</svg>
